services:
  v2prodock:
    build: .
    container_name: v2prodock
    restart: unless-stopped
    networks:
      - v2prodock-proxy-net
    ports:
      - "27000-27100:27000-27100"   # Dynamic proxy ports (SOCKS5 + HTTP)
      - "27018:27018"               # API
    volumes:
      - ./config:/root/config
    environment:
      - SUBSCRIPTION_URL=${SUBSCRIPTION_URL:-}
      - SUBSCRIPTION_URLS=${SUBSCRIPTION_URLS:-}
      - HEALTH_CHECK_URL=${HEALTH_CHECK_URL:-http://api.ipify.org}
      - PROXY_INSTANCES=${PROXY_INSTANCES:-1}
      - PORT_BASE=${PORT_BASE:-27019}
      - API_PORT=${API_PORT:-27018}
      - XRAY_DIR=${XRAY_DIR:-/root/xray}
      - GOGC=${GOGC:-100}
      - GOMEMLIMIT=${GOMEMLIMIT:-128MiB}
      - MAX_CONNS=${MAX_CONNS:-128}
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  v2prodock-proxy-net:
    driver: bridge
