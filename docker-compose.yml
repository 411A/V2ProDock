services:
  v2prodock:
    build: .
    container_name: v2prodock
    restart: unless-stopped
    networks:
      - v2prodock-proxy-net
    ports:
      - "27019:27019"   # SOCKS5
      - "27020:27020"   # HTTP
    volumes:
      - ./config:/root/config
    env_file:
      - .env
    environment:
      - SUBSCRIPTION_URL=${SUBSCRIPTION_URL:-}
      - HEALTH_CHECK_URL=${HEALTH_CHECK_URL:-http://api.ipify.org}
      - XRAY_DIR=${XRAY_DIR:-/root/xray}
    healthcheck:
      test: ["CMD-SHELL", "pgrep v2proxy > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Example: another service using the proxy
  # Uncomment and modify for your needs
  # app:
  #   image: your-app:latest
  #   container_name: app
  #   restart: unless-stopped
  #   networks:
  #     - v2prodock-proxy-net
  #   environment:
  #     - HTTP_PROXY=http://v2prodock:27020
  #     - HTTPS_PROXY=socks5://v2prodock:27019
  #     - NO_PROXY=localhost,127.0.0.1,192.168.1.0/24

networks:
  v2prodock-proxy-net:
    driver: bridge
